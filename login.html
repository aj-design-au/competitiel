<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Competitel — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-main:    #F8F9FA;
      --bg-surface: #FFFFFF;
      --bg-inverse: #0A0A0A;

      --text-primary:   #000000;
      --text-secondary: #4B5563;
      --text-muted:     #9CA3AF;
      --text-on-inv:    #FFFFFF;

      --green:       #16A34A;
      --green-hover: #15803D;
      --green-light: #F0FDF4;

      --red:        #DC2626;
      --red-light:  #FEF2F2;

      --border:  #E5E7EB;
      --neutral: #F3F4F6;

      --shadow-card: 0 20px 48px -12px rgba(0,0,0,0.10);
      --shadow-soft: 0 8px 24px -4px rgba(0,0,0,0.06);

      --r-card:  28px;
      --r-input: 14px;
      --r-pill:  9999px;

      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(900px 600px at 50% 0%, rgba(22,163,74,0.04) 0%, transparent 70%),
        radial-gradient(1200px 700px at 50% 0%, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.00) 55%),
        linear-gradient(180deg, #F8F9FA 0%, #F1F3F5 55%, #F8F9FA 100%);
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.03em;
      color: var(--green);
      text-decoration: none;
    }
    .logo-mark {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 18px -4px rgba(22,163,74,0.45);
    }
    .logo-mark svg { width: 20px; height: 20px; fill: #fff; }

    .tagline {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      background: var(--bg-surface);
      border-radius: var(--r-card);
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 16px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      text-align: center;
      transition: color 0.15s, background 0.15s;
      border: none;
      background: var(--neutral);
      font-family: var(--font);
      letter-spacing: -0.01em;
    }
    .tab:first-child { border-radius: var(--r-card) 0 0 0; }
    .tab:last-child  { border-radius: 0 var(--r-card) 0 0; }
    .tab.active {
      background: var(--bg-surface);
      color: var(--text-primary);
    }

    /* ── Form body ── */
    .form-body {
      padding: 28px 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }

    .input-wrap {
      position: relative;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--r-input);
      border: 1.5px solid var(--border);
      background: var(--bg-main);
      font-family: var(--font);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    input:focus {
      border-color: var(--green);
      background: var(--bg-surface);
      box-shadow: 0 0 0 3px rgba(22,163,74,0.10);
    }
    input::placeholder { color: var(--text-muted); }
    input.has-toggle { padding-right: 48px; }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      color: var(--text-muted);
      transition: color 0.15s;
    }
    .toggle-pw:hover { color: var(--text-primary); }
    .toggle-pw svg { width: 18px; height: 18px; }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      padding: 14px 24px;
      border-radius: var(--r-pill);
      background: var(--green);
      border: none;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 8px 24px -4px rgba(22,163,74,0.35);
      letter-spacing: -0.01em;
      margin-top: 4px;
    }
    .btn-submit:hover:not(:disabled) {
      background: var(--green-hover);
      box-shadow: 0 12px 32px -4px rgba(22,163,74,0.45);
    }
    .btn-submit:active:not(:disabled) { transform: scale(0.99); }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Spinner inside button */
    .spin {
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Messages ── */
    .error-msg {
      font-size: 13px;
      color: var(--red);
      background: var(--red-light);
      border: 1px solid #FECACA;
      border-radius: 10px;
      padding: 10px 14px;
      line-height: 1.5;
      display: none;
    }
    .error-msg.show { display: block; }

    .success-msg {
      font-size: 13px;
      color: #065F46;
      background: var(--green-light);
      border: 1px solid #BBF7D0;
      border-radius: 10px;
      padding: 12px 16px;
      line-height: 1.6;
      display: none;
      text-align: center;
    }
    .success-msg.show { display: block; }
    .success-msg strong { font-weight: 700; }

    /* ── Footer note ── */
    .login-footer {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }
    .login-footer a { color: var(--green); text-decoration: none; font-weight: 600; }
    .login-footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      body { padding: 16px; align-items: flex-start; padding-top: 40px; }
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <!-- Logo + tagline -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;">
    <a href="/" class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M3 17l4-8 4 4 4-7 4 11H3z"/></svg>
      </div>
      Competitel
    </a>
    <p class="tagline">Price intelligence that keeps you ahead.</p>
  </div>

  <!-- Card -->
  <div class="card">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-signin"  onclick="switchTab('signin')">Sign In</button>
      <button class="tab"        id="tab-signup"  onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Form body -->
    <div class="form-body">

      <!-- Error + success messages -->
      <div id="error-msg"   class="error-msg"></div>
      <div id="success-msg" class="success-msg"></div>

      <!-- Email -->
      <div class="form-group">
        <label for="input-email">Email</label>
        <input type="email" id="input-email" placeholder="you@company.com" autocomplete="email" />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="input-password">Password</label>
        <div class="input-wrap">
          <input type="password" id="input-password" placeholder="••••••••" class="has-toggle" autocomplete="current-password" />
          <button class="toggle-pw" type="button" onclick="togglePassword()" aria-label="Show/hide password" title="Show/hide password">
            <!-- Eye icon (show) -->
            <svg id="icon-eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Eye-off icon (hide) — hidden by default -->
            <svg id="icon-eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button class="btn-submit" id="btn-submit" onclick="handleSubmit()">
        <span id="btn-label">Sign In</span>
      </button>

    </div>
  </div>

  <p class="login-footer">
    By signing in, you agree to our
    <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
  </p>

</div>

<script>
  // ── State ───────────────────────────────────────────────────────────────────
  let _supabase = null;
  let _mode     = 'signin'; // 'signin' | 'signup'

  // ── Init: load Supabase config, check existing session ──────────────────────
  (async () => {
    try {
      const cfg = await fetch('/api/config').then(r => r.json());
      if (!cfg.supabase_url || !cfg.supabase_anon_key) {
        showError('Supabase is not configured yet. Add SUPABASE_URL and SUPABASE_ANON_KEY to your .env file and restart the server.');
        return;
      }
      _supabase = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);

      // Redirect if already signed in
      const { data: { session } } = await _supabase.auth.getSession();
      if (session) {
        window.location.href = '/dashboard.html';
      }
    } catch (err) {
      // Server may be starting — degrade gracefully
      console.warn('[login] Could not load config:', err.message);
    }
  })();

  // ── Tab switching ────────────────────────────────────────────────────────────
  function switchTab(mode) {
    _mode = mode;
    document.getElementById('tab-signin').classList.toggle('active', mode === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
    document.getElementById('btn-label').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
    clearMessages();
    // Reset autocomplete hint on password
    document.getElementById('input-password').autocomplete = mode === 'signin' ? 'current-password' : 'new-password';
  }

  // ── Password show/hide ───────────────────────────────────────────────────────
  function togglePassword() {
    const input = document.getElementById('input-password');
    const show  = document.getElementById('icon-eye-show');
    const hide  = document.getElementById('icon-eye-hide');
    if (input.type === 'password') {
      input.type = 'text';
      show.style.display = 'none';
      hide.style.display = '';
    } else {
      input.type = 'password';
      show.style.display = '';
      hide.style.display = 'none';
    }
  }

  // ── Messages ─────────────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('success-msg').classList.remove('show');
  }

  function showSuccess(html) {
    const el = document.getElementById('success-msg');
    el.innerHTML = html;
    el.classList.add('show');
    document.getElementById('error-msg').classList.remove('show');
  }

  function clearMessages() {
    document.getElementById('error-msg').classList.remove('show');
    document.getElementById('success-msg').classList.remove('show');
  }

  // ── Loading state ────────────────────────────────────────────────────────────
  function setLoading(loading) {
    const btn   = document.getElementById('btn-submit');
    const label = document.getElementById('btn-label');
    btn.disabled = loading;
    if (loading) {
      label.innerHTML = `<span class="spin"></span>`;
    } else {
      label.textContent = _mode === 'signin' ? 'Sign In' : 'Create Account';
    }
  }

  // ── Form submission ──────────────────────────────────────────────────────────
  async function handleSubmit() {
    if (!_supabase) {
      showError('Supabase client is not initialized. Check your server configuration.');
      return;
    }

    clearMessages();
    const email    = document.getElementById('input-email').value.trim();
    const password = document.getElementById('input-password').value;

    if (!email)    { showError('Please enter your email address.');      return; }
    if (!password) { showError('Please enter your password.');           return; }
    if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

    setLoading(true);

    try {
      if (_mode === 'signin') {
        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) { showError(error.message); return; }
        if (data.session) {
          window.location.href = '/dashboard.html';
        }
      } else {
        const { data, error } = await _supabase.auth.signUp({ email, password });
        if (error) { showError(error.message); return; }
        // If email confirmation is enabled, show success message
        if (data.user && !data.session) {
          showSuccess('<strong>Account created!</strong><br>Check your inbox to confirm your email, then sign in.');
        } else if (data.session) {
          // Email confirmation disabled — signed in immediately
          window.location.href = '/dashboard.html';
        }
      }
    } catch (err) {
      showError('An unexpected error occurred. Please try again.');
      console.error('[login] Submit error:', err);
    } finally {
      setLoading(false);
    }
  }

  // ── Allow Enter key to submit ─────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
